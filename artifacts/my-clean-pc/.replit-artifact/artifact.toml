kind = "web"
previewPath = "/"
title = "My Clean PC"
version = "1.0.0"
id = "artifacts/my-clean-pc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19705

[services.development]
run = "pnpm --filter @workspace/my-clean-pc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/my-clean-pc", "run", "build" ]
publicDir = "artifacts/my-clean-pc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
